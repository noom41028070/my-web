       /* 修改原本的 canvas 樣式 */
canvas {

}

#canvas-container {
    position: relative;

    display: flex;
    justify-content: center;
    align-items: center;
    touch-action: none;
    overflow: hidden;
    /* 讓容器大小根據內容自動調整 */
    width: auto; 
    height: auto;
    min-width: 800px;
    min-height: 600px;
/* 確保畫布不會因為超出容器而造成捲動條出現或偏移 */
    overflow: hidden; 
    /* 確保容器本身固定在父層的中間 */
    margin: 0 auto;
    /* 變形動畫可以更流暢 */
    transition: transform 0.1s ease-out;
}

<script>
// DOM 元素獲取
const canvasContainer = document.getElementById('canvas-container');
const pencilTool = document.getElementById('pencil-tool');
const eraserTool = document.getElementById('eraser-tool');
const selectTool = document.getElementById('select-tool');
const brushSizeInput = document.getElementById('brush-size');
const brushColorInput = document.getElementById('brush-color');
const pressureSlider = document.getElementById('pressure-slider');
const addLayerButton = document.getElementById('add-layer');
const clearLayerButton = document.getElementById('clear-layer');
const layerList = document.getElementById('layer-list');
const exportButton = document.getElementById('export-image');
const bgColorSelect = document.getElementById('background-color');
const customBgColorInput = document.getElementById('custom-bg-color');
const zoomInButton = document.getElementById('zoom-in');
const zoomOutButton = document.getElementById('zoom-out');
const saveRecordButton = document.getElementById('save-record');
const loadRecordButton = document.getElementById('load-record');
const uploadImageInput = document.getElementById('upload-image');
const canvasWidthInput = document.getElementById('canvas-width');
const canvasHeightInput = document.getElementById('canvas-height');
const resizeCanvasButton = document.getElementById('resize-canvas');
const panHorizontalSlider = document.getElementById('pan-horizontal');
const panVerticalSlider = document.getElementById('pan-vertical');
//
const layerBgColorInput = document.getElementById('layer-bg-color');
const fillLayerBgButton = document.getElementById('fill-layer-bg');
const bgTypeSelect = document.getElementById('bg-type-select');


// 在你的程式碼全域區塊新增一個隱藏畫布
const offscreenCanvas = document.createElement('canvas');
const offCtx = offscreenCanvas.getContext('2d');

function drawSelectionOutlineOnly() {
    const overlayCanvas = document.getElementById('overlay');
    const overlayCtx = overlayCanvas.getContext('2d');

    // 1. 同步離屏畫布大小 (僅在改變時執行)
    if (offscreenCanvas.width !== overlayCanvas.width || offscreenCanvas.height !== overlayCanvas.height) {
        offscreenCanvas.width = overlayCanvas.width;
        offscreenCanvas.height = overlayCanvas.height;
    }

    // 2. 在離屏畫布上繪製 (這裡可以盡情 clearRect，因為它不可見)
    offCtx.clearRect(0, 0, offscreenCanvas.width, offscreenCanvas.height);
    
    if (selectionBox) {
        offCtx.save();
        offCtx.strokeStyle = '#0095ff';
        offCtx.lineWidth = 2;
        offCtx.setLineDash([5, 5]);
        offCtx.strokeRect(selectionBox.x, selectionBox.y, selectionBox.width, selectionBox.height);
        offCtx.setLineDash([]);

        const s = 10;
        const hs = s / 2;
        offCtx.fillStyle = '#0095ff';
        offCtx.beginPath();
        offCtx.rect(selectionBox.x - hs, selectionBox.y - hs, s, s);
        offCtx.rect(selectionBox.x + selectionBox.width - hs, selectionBox.y - hs, s, s);
        offCtx.rect(selectionBox.x - hs, selectionBox.y + selectionBox.height - hs, s, s);
        offCtx.rect(selectionBox.x + selectionBox.width - hs, selectionBox.y + selectionBox.height - hs, s, s);
        offCtx.fill();
        offCtx.restore();
    }

    // 3. 【核心修正】：不要清除整個 overlayCtx！
    // 為了避免「白色閃爍」，我們使用 `globalCompositeOperation = 'copy'`
    // 這樣可以直接將 offscreenCanvas 的內容直接覆蓋到 overlay 上，
    // 而不需要先 clearRect 掉舊內容。
    overlayCtx.save();
    overlayCtx.globalCompositeOperation = 'copy'; 
    overlayCtx.drawImage(offscreenCanvas, 0, 0);
    overlayCtx.restore();
}
// 全域變數
// 在全域變數區新增：
const canvas = document.getElementById('drawing-canvas'); // 加入這行
let originalSelectionData = null; // 儲存選取區最原始的樣子
let originalSelectionPos = { x: 0, y: 0 };
let currentTool = 'pencil';
let currentLayer = null;
let isDrawing = false;
let layers = [];
let layerCounter = 0;
let lastPosition = null;
let backgroundColor = 'white';
let scale = 1;
let offsetX = 0;
let offsetY = 0;

// 選取工具相關變數
let selectionBox = null;
let isSelecting = false;
let isMovingSelection = false;
let selectionOffset = { x: 0, y: 0 };
let selectionData = null;
let selectionStartPos = {
    x:0,
    y:0
};

let selectionClipboard = null;

let selectionMovingStart = {
    x:0,
    y:0
};




let floatingSelection = {

    canvas:null,

    x:0,

    y:0,

    width:0,

    height:0

};





// 繪圖相關的基本函數
function getCoordinates(e) {
    const rect = currentLayer.canvas.getBoundingClientRect();
    
    // PointerEvent 直接讀取 clientX/Y 即可，不需要再透過 e.touches
    // 這樣在手機與滑鼠上都能運作
    return {
        x: (e.clientX - rect.left) / scale,
        y: (e.clientY - rect.top) / scale
    };
}

function createLayer(canvasData = null) {
    const canvas = document.createElement('canvas');
    canvas.width = parseInt(canvasWidthInput.value, 10);
    canvas.height = parseInt(canvasHeightInput.value, 10);
    canvas.style.position = 'absolute';
    canvas.style.top = '0';
    canvas.style.left = '0';
    
    // 初始化 zIndex：後續透過 reorderLayers 更新
    canvas.style.zIndex = layers.length + 1;
    
    const layer = {
        id: layerCounter++,
        canvas: canvas,
        originalCanvas: document.createElement('canvas'), // 增加這行防止 undefined
        opacity: 1,
        visible: true,
        rotation: 0,
        mirrored: false,
        scale: 1
    };
    
    // 初始化 originalCanvas 大小
    layer.originalCanvas.width = canvas.width;
    layer.originalCanvas.height = canvas.height;
    
    canvasContainer.appendChild(canvas);
    layers.push(layer);
    currentLayer = layer;

    if (canvasData) {
        const img = new Image();
        img.onload = () => {
            canvas.getContext('2d').drawImage(img, 0, 0);
            syncOriginalCanvas(layer);
        };
        img.src = canvasData;
    }

    updateLayerList(); // 呼叫你更新後的拖曳列表
    updateLayerHighlight();
    return layer;
}

// 增強型同步函數：防止 originalCanvas 不存在
function syncOriginalCanvas(layer) {
    if (!layer.originalCanvas) {
        layer.originalCanvas = document.createElement('canvas');
        layer.originalCanvas.width = layer.canvas.width;
        layer.originalCanvas.height = layer.canvas.height;
    }
    const origCtx = layer.originalCanvas.getContext('2d');
    origCtx.clearRect(0, 0, layer.originalCanvas.width, layer.originalCanvas.height);
    origCtx.drawImage(layer.canvas, 0, 0);
}// 記得補上這一個同步函數，這樣邏輯才完整
    function syncOriginalCanvas(layer) {
        const origCtx = layer.originalCanvas.getContext('2d');
        origCtx.clearRect(0, 0, layer.originalCanvas.width, layer.originalCanvas.height);
        origCtx.drawImage(layer.canvas, 0, 0);
    }

function updateLayerHighlight() {
    const layerOptions = document.querySelectorAll('.layer-option');
    layerOptions.forEach(option => {
        option.classList.remove('active');
        if (parseInt(option.dataset.layerId) === currentLayer.id) {
            option.classList.add('active');
        }
    });
}

function deleteLayer(layer) {
    if (layers.length <= 1) return; // 保持至少一個圖層
    
    // 從 DOM 中移除 canvas
    layer.canvas.remove();
    
    // 從數組中移除圖層
    layers = layers.filter(l => l.id !== layer.id);
    
    // 如果刪除的是當前圖層，選擇最上面的圖層
    if (currentLayer === layer) {
        currentLayer = layers[layers.length - 1];
    }
    
    // 移除圖層控制項
    const layerOption = document.querySelector(`.layer-option[data-layer-id="${layer.id}"]`);
    if (layerOption) {
        layerOption.remove();
    }
    
    updateLayerHighlight();
}

function toggleLayerVisibility(layer, button) {
    layer.visible = !layer.visible;
    layer.canvas.style.display = layer.visible ? 'block' : 'none';
    button.textContent = layer.visible ? '隱藏' : '顯示';
}

function setLayerOpacity(layer, opacity) {
    layer.opacity = opacity / 100;
    layer.canvas.style.opacity = layer.opacity;
}

function selectLayer(layer) {
    currentLayer = layer;
    updateLayerHighlight();
}


function copySelection(){

    if(!selectionData)
        return;


    const temp=document.createElement("canvas");

    temp.width=selectionData.width;

    temp.height=selectionData.height;


    temp.getContext("2d")
    .putImageData(
        selectionData,
        0,
        0
    );


    floatingSelection.canvas=temp;

}

document.addEventListener(
"keydown",
e=>{


if(
e.ctrlKey &&
e.key==="c"
){

copySelection();

}


if(
e.ctrlKey &&
e.key==="x"
){

cutSelection();

}


if(
e.ctrlKey &&
e.key==="v"
){

pasteSelection();

}


});

function pasteSelection(){

    if(!floatingSelection.canvas)
        return;


    const canvas=
    floatingSelection.canvas;


    selectionBox={

        x:20,

        y:20,

        width:canvas.width,

        height:canvas.height

    };


    selectionData=
    canvas
    .getContext("2d")
    .getImageData(
        0,
        0,
        canvas.width,
        canvas.height
    );


    drawSelectionBox();

}



function cutSelection(){

    if(!selectionData || !selectionBox)
        return;


    copySelection();


    const ctx=
    currentLayer.canvas.getContext("2d");

    ctx.clearRect(
        selectionBox.x,
        selectionBox.y,
        selectionBox.width,
        selectionBox.height
    );

    selectionData = null;
    selectionBox = null;
    drawSelectionBox();

}

function mergeLayers() {
    const selectedCheckboxes = document.querySelectorAll('.layer-checkbox:checked');
    if (selectedCheckboxes.length < 2) {
        alert('請選擇至少兩個圖層進行合併');
        return;
    }

    // 取得選中的 ID
    const selectedIds = Array.from(selectedCheckboxes).map(c => 
        parseInt(c.closest('.layer-option').dataset.layerId)
    );

    // 建立新畫布
    const mergeCanvas = document.createElement('canvas');
    mergeCanvas.width = parseInt(canvasWidthInput.value, 10);
    mergeCanvas.height = parseInt(canvasHeightInput.value, 10);
    const ctx = mergeCanvas.getContext('2d');

    // 依照 layers 陣列原本的順序繪製 (底層到頂層)
    layers.filter(l => selectedIds.includes(l.id)).forEach(layer => {
        if (layer.visible) {
            ctx.globalAlpha = layer.opacity;
            ctx.drawImage(layer.canvas, 0, 0);
        }
    });

    // 移除舊圖層
    selectedIds.forEach(id => {

function draw(e) {
    if (!currentLayer) return;
    
    const ctx = currentLayer.canvas.getContext('2d');
    const { x, y } = getCoordinates(e);

    // 【修正點】：將 slider 的值正規化為 0-1 的區間，確保與 e.pressure 對齊
    const sliderPressure = parseFloat(pressureSlider.value) / 100;
    
    // 檢查 e.pressure：若為 0 或 undefined，則強制使用滑桿設定
    const pressure = (e.pressure && e.pressure > 0) ? e.pressure : sliderPressure;
    
    // 筆刷大小與透明度邏輯
    const brushSize = brushSizeInput.value * pressure;
    const brushAlpha = pressure;

    ctx.lineWidth = brushSize;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.strokeStyle = currentTool === 'pencil' ? brushColorInput.value : 'rgba(255,255,255,1)';
    ctx.globalAlpha = brushAlpha;

    if (lastPosition) {
        ctx.beginPath();
        ctx.moveTo(lastPosition.x, lastPosition.y);
        ctx.lineTo(x, y);
        ctx.stroke();
    }
    lastPosition = { x, y };
}
function erase(e) {
    if (!currentLayer) return;

    const ctx = currentLayer.canvas.getContext('2d');
    const { x, y } = getCoordinates(e);

    const pressure = e.pressure > 0 ? e.pressure : pressureSlider.value;
    const brushSize = brushSizeInput.value * pressure;

    ctx.save();
    ctx.globalCompositeOperation = 'destination-out';
    ctx.lineWidth = brushSize;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    if (lastPosition) {
        ctx.beginPath();
        ctx.moveTo(lastPosition.x, lastPosition.y);
        ctx.lineTo(x, y);
        ctx.stroke();
    } else {
        // 單點點擊也要擦得掉
        ctx.beginPath();
        ctx.arc(x, y, brushSize / 2, 0, Math.PI * 2);
        ctx.fill();
    }

    ctx.restore();
    lastPosition = { x, y };
}

}function drawSelectionBox() {

// 檢查滑鼠是否在選取區內 (但不在把手上)
function isInsideSelection(x, y) {
    if (!selectionBox) return false;
    
    // 檢查點擊處是否在選取框範圍內 (包含邊框)
    const inBox = (x >= selectionBox.x && x <= selectionBox.x + selectionBox.width &&
                   y >= selectionBox.y && y <= selectionBox.y + selectionBox.height);
    
    // 如果點到了把手，移動功能應該失效，所以這裡回傳 false 是正確的
    // 但為了讓體驗更好，建議明確區分：
    if (getActiveHandle(x, y)) {
        return false; 
    }
    
    return inBox;
}
// 輔助函式：判斷是否點中把手 (四個角)
function getActiveHandle(x, y) {
    if (!selectionBox) return null;
    const s = 20; // 擴大感應範圍，比較好點中
    const handles = {
        tl: { x: selectionBox.x, y: selectionBox.y },
        tr: { x: selectionBox.x + selectionBox.width, y: selectionBox.y },
        bl: { x: selectionBox.x, y: selectionBox.y + selectionBox.height },
        br: { x: selectionBox.x + selectionBox.width, y: selectionBox.y + selectionBox.height }
    };

    for (let key in handles) {
        // 使用距離公式或簡易矩形判斷
        if (Math.abs(x - handles[key].x) < s && Math.abs(y - handles[key].y) < s) {
            return key;
        }
    }
    return null;

function handlePointerDown(e) {
    e.preventDefault();
    const { x, y } = getCoordinates(e);

    if (currentTool === 'select') {
        activeHandle = getActiveHandle(x, y);
        
        if (activeHandle || (selectionBox && isInsideSelection(x, y))) {
            // 【核心修正】：開始變形或移動前，先清除圖層原位置的舊內容
            const ctx = currentLayer.canvas.getContext('2d');
            ctx.clearRect(selectionBox.x, selectionBox.y, selectionBox.width, selectionBox.height);
            
            // 標記狀態
            if (activeHandle) isMovingSelection = false;
            else isMovingSelection = true;
            
            // 記錄起始偏移量 (如果是移動的話)
            selectionOffset = { x: x - selectionBox.x, y: y - selectionBox.y };
            originalSelectionPos = { x: selectionBox.x, y: selectionBox.y };
        } else {
            startSelection(e);
        }
    } else {
        // 原有的繪圖邏輯
        isDrawing = true;
        lastPosition = null;
        if (currentTool === 'eraser') {
            erase(e);
        } else {
            draw(e);
        }
    }
}// 宣告一個變數來存放是否需要更新的標記
let isPendingUpdate = false;



// 全域變數，用於防抖動
// 在全域宣告一個變數記錄上一次的位置
let lastMovePos = { x: 0, y: 0 };

function handlePointerMove(e) {
    e.preventDefault();
    const { x, y } = getCoordinates(e);

    // 1. 防抖動檢查：若滑鼠位移極小，則不進行渲染，消除因連續觸發導致的閃爍
    if (Math.abs(x - lastMovePos.x) < 1 && Math.abs(y - lastMovePos.y) < 1) return;
    lastMovePos = { x, y };

    if (currentTool === 'select') {
        if (activeHandle) {
            updateSelectionSize(x, y);
            drawSelectionBox();
        } 
        else if (isMovingSelection && selectionBox) {
            // 2. 移動時：先計算座標，再呼叫重繪
            selectionBox.x = x - selectionOffset.x;
            selectionBox.y = y - selectionOffset.y;
            
            // 【優化】這裡維持 drawSelectionOutlineOnly，但需確保它內部執行極快
            drawSelectionOutlineOnly();
        } 
        else if (isSelecting) {
            updateSelection(e);
        }
    } else if (isDrawing) {
        currentTool === 'eraser' ? erase(e) : draw(e);
    }
}



function handlePointerUp(e) {
    e.preventDefault();
    
    if (!currentLayer || !currentLayer.canvas) {
        isDrawing = false;
        return;
    }

    const ctx = currentLayer.canvas.getContext('2d');

    if (currentTool === 'select') {
        // 1. 處理移動結束
        if (isMovingSelection) {
            // 清除移動前的原位置內容
            ctx.clearRect(originalSelectionPos.x, originalSelectionPos.y, selectionData.width, selectionData.height);
            // 寫入新位置
            ctx.putImageData(selectionData, selectionBox.x, selectionBox.y);
            
            isMovingSelection = false;
        }
        // 2. 處理縮放結束
        else if (activeHandle) {
            // 先清除變形前的原位置內容，防止殘影
            ctx.clearRect(originalSelectionPos.x, originalSelectionPos.y, selectionData.width, selectionData.height);

            // 進行縮放運算
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = selectionBox.width;
            tempCanvas.height = selectionBox.height;
            const tCtx = tempCanvas.getContext('2d');
            
            const source = document.createElement('canvas');
            source.width = selectionData.width;
            source.height = selectionData.height;
            source.getContext('2d').putImageData(selectionData, 0, 0);
            
            tCtx.drawImage(source, 0, 0, selectionBox.width, selectionBox.height);
            selectionData = tCtx.getImageData(0, 0, selectionBox.width, selectionBox.height);
            
            // 將變形後的結果寫入畫布
            ctx.putImageData(selectionData, selectionBox.x, selectionBox.y);
            
            activeHandle = null; 
        }
        else if (isSelecting) {
            finishSelection();
        }
    }
    
    // 3. 通用重置與備份[cite: 1]
    isDrawing = false;
    lastPosition = null;
    isMovingSelection = false;
    activeHandle = null;

    if (currentLayer && currentLayer.originalCanvas) {
        const origCtx = currentLayer.originalCanvas.getContext('2d');
        origCtx.clearRect(0, 0, currentLayer.originalCanvas.width, currentLayer.originalCanvas.height);
        origCtx.drawImage(currentLayer.canvas, 0, 0);
    }
    
    drawSelectionBox();
}

// 縮放和平移功能
function updateCanvasTransform() {
    const translateX = Math.min(500, Math.max(-500, offsetX));
    const translateY = Math.min(500, Math.max(-500, offsetY));
    
    layers.forEach(layer => {
        layer.canvas.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
    });
}

// 修改縮放邏輯
function zoomIn() {
    scale = Math.min(scale * 1.2, 5); // 限制最大縮放倍率，防止效能崩潰
    applyTransform();
}

function zoomOut() {
    scale = Math.max(scale / 1.2, 0.1); // 限制最小縮放
    applyTransform();
}

// 1. 修改縮放邏輯，確保變形中心點正確
function applyTransform() {
    // 限制縮放倍率，防止過度放大導致畫布溢出視野
    // 將 scale 限制在 0.5 到 3 倍之間（視需求調整）
    scale = Math.min(Math.max(scale, 0.5), 3);
    
    // 將平移數值限制在容器的一定範圍內，避免畫布完全跑出畫面
    // 這裡使用 clamp 的概念
    const maxOffset = 300; 
    offsetX = Math.min(Math.max(offsetX, -maxOffset), maxOffset);
    offsetY = Math.min(Math.max(offsetY, -maxOffset), maxOffset);
    
    // 設定變形基準點為畫布中心
    canvasContainer.style.transformOrigin = "center center";
    
    // 應用縮放與位移
    canvasContainer.style.transform = `scale(${scale}) translate(${offsetX / scale}px, ${offsetY / scale}px)`;
}

// 2. 調整 zoomIn/zoomOut
function zoomIn() {
    scale *= 1.2;
    applyTransform();
}

function zoomOut() {
    scale /= 1.2;
    applyTransform();
}

function loadDrawingState() {
    try {
        const savedState = JSON.parse(localStorage.getItem('drawingState'));
        if (!savedState) {
            alert('沒有找到保存的繪圖狀態！');
            return;
        }
// 恢復畫布大小
        if (savedState.canvasSize) {
            canvasWidthInput.value = savedState.canvasSize.width;
            canvasHeightInput.value = savedState.canvasSize.height;
            resizeCanvas(); // 應用保存的畫布大小
        }

        // 清除現有圖層
        while (layers.length > 0) {
            const layer = layers.pop();
            layer.canvas.remove();
        }
        layerList.innerHTML = '';
        layerCounter = 0;

        // 恢復基本設定
        backgroundColor = savedState.backgroundColor || 'white';
        scale = savedState.scale || 1;
        offsetX = savedState.offsetX || 0;
        offsetY = savedState.offsetY || 0;

        // 恢復畫布大小
        canvasWidthInput.value = savedState.canvasSize.width;
        canvasHeightInput.value = savedState.canvasSize.height;
        canvasContainer.style.width = `${savedState.canvasSize.width}px`;
        canvasContainer.style.height = `${savedState.canvasSize.height}px`;

        // 恢復背景設置
        if (savedState.backgroundType) {
            bgColorSelect.value = savedState.backgroundType;
            customBgColorInput.value = savedState.customBackgroundColor || '#ffffff';
            if (savedState.backgroundType === 'custom') {
                customBgColorInput.classList.remove('hidden');
            }
        }

        // 恢復筆刷設置
        if (savedState.brushSettings) {
            brushSizeInput.value = savedState.brushSettings.size;
            brushColorInput.value = savedState.brushSettings.color;
            pressureSlider.value = savedState.brushSettings.pressure;
        }

        // 恢復圖層
        savedState.layers.forEach(layerData => {
            const img = new Image();
            img.onload = () => {
                const layer = createLayer();
                const ctx = layer.canvas.getContext('2d');
                
                // 恢復圖層屬性
                layer.name = layerData.name;
                layer.opacity = layerData.opacity;
                layer.visible = layerData.visible;
                layer.rotation = layerData.rotation;
                layer.mirrored = layerData.mirrored;
                layer.isTransparent = layerData.isTransparent;
                
                // 恢復圖層變換狀態
                ctx.save();
                ctx.translate(layer.canvas.width / 2, layer.canvas.height / 2);
                ctx.scale(layer.mirrored ? -1 : 1, 1);
                ctx.rotate(layer.rotation * Math.PI / 180);
                ctx.drawImage(img, -layer.canvas.width / 2, -layer.canvas.height / 2);
                ctx.restore();
                
                // 更新圖層顯示
                layer.canvas.style.opacity = layerData.opacity;
                layer.canvas.style.display = layerData.visible ? 'block' : 'none';
                layer.canvas.style.zIndex = layerData.zIndex;

                // 如果是透明圖層，更新顯示
                if (layerData.isTransparent) {
                    updateLayerDisplay(layer);
                }
            };
            img.src = layerData.canvasData;
        });

        // 恢復當前選中的圖層
        if (savedState.currentLayerId !== null) {
            const currentLayerIndex = layers.findIndex(l => l.id === savedState.currentLayerId);
            if (currentLayerIndex !== -1) {
                currentLayer = layers[currentLayerIndex];
            }
        }

        // 更新變換
        updateCanvasTransform();
        // 更新圖層列表
        updateLayerList();
        
        alert('讀取成功！');
    } catch (error) {
        console.error('讀取失敗:', error);
        alert('讀取失敗，請查看控制台了解詳細信息。');
    }
}

// 繪製透明背景棋盤格的函數
function drawCheckerboard(ctx, width, height) {
    const tileSize = 10; // 棋盤格的大小
    
    // 清除畫布
    ctx.clearRect(0, 0, width, height);
    
    // 繪製棋盤格
    for (let x = 0; x < width; x += tileSize) {
        for (let y = 0; y < height; y += tileSize) {
            if ((Math.floor(x / tileSize) + Math.floor(y / tileSize)) % 2 === 0) {
                ctx.fillStyle = "#ffffff"; // 白色格子
            } else {
                ctx.fillStyle = "#cccccc"; // 灰色格子
            }
            ctx.fillRect(x, y, tileSize, tileSize);
        }
    }
}

// 復原功能管理器
class UndoManager {
    constructor() {
        this.states = new Map();
        this.maxStates = 99; // 增加最大狀態數量
        this.isDrawing = false;
        this.currentStateIndex = -1; // 追蹤當前狀態索引
        this.stateHistory = []; // 使用陣列來更好地管理狀態順序
        this.bindEvents();
        this.saveState(); // 保存初始狀態
    }

    bindEvents() {
        // 復原按鈕點擊事件
        const undoButton = document.getElementById('undo-tool');
        if (undoButton) {
            undoButton.addEventListener('click', () => this.loadPreviousState());
        }

        // Ctrl+Z 快捷鍵
        document.addEventListener('keydown', (e) => {
    console.log('Key pressed:', e.key);
    console.log('Ctrl key:', e.ctrlKey);
    if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
        console.log('Shortcut triggered!');
        e.preventDefault();
        this.loadPreviousState();
    }
});

        // 繪圖相關事件監聽
        const canvasContainer = document.getElementById('canvas-container');
        if (canvasContainer) {
            // 開始繪圖時
            canvasContainer.addEventListener('pointerdown', (e) => {
                if (currentTool === 'pencil' || currentTool === 'eraser') {
                    this.isDrawing = true;
                    // 開始繪圖時保存當前狀態
                    this.saveState();
                }
            });

            // 結束繪圖時
            canvasContainer.addEventListener('pointerup', (e) => {
                if (this.isDrawing && (currentTool === 'pencil' || currentTool === 'eraser')) {
                    this.isDrawing = false;
                    // 結束繪圖時保存新狀態
                    this.saveState();
                }
            });

            // 滑鼠離開畫布時
            canvasContainer.addEventListener('pointerout', (e) => {
                if (this.isDrawing && (currentTool === 'pencil' || currentTool === 'eraser')) {
                    this.isDrawing = false;
                    this.saveState();
                }
            });

            // 取消繪圖時
            canvasContainer.addEventListener('pointercancel', (e) => {
                if (this.isDrawing && (currentTool === 'pencil' || currentTool === 'eraser')) {
                    this.isDrawing = false;
                    this.saveState();
                }
            });
        }

        // 選取工具完成時保存狀態
        document.addEventListener('selectionComplete', () => {
            if (currentTool === 'select') {
                this.saveState();
            }
        });

        // 移動選取區域完成時保存狀態
        document.addEventListener('selectionMoved', () => {
            if (currentTool === 'select') {
                this.saveState();
            }
        });
    }

    saveState() {
        const currentTime = Date.now();
        const state = {
            timestamp: currentTime,
            layers: layers.map(layer => ({
                opacity: layer.opacity,
                visible: layer.visible,
                canvasData: layer.canvas.toDataURL()
            })),
            backgroundColor: backgroundColor,
            brushSize: brushSizeInput.value,
            brushColor: brushColorInput.value,
            pressureSliderValue: pressureSlider.value,
            canvasWidth: canvasWidthInput.value,
            canvasHeight: canvasHeightInput.value,
            selection: selectionBox ? {
                box: selectionBox,
                data: selectionData ? Array.from(selectionData.data) : null
            } : null
        };

        // 如果不是在繪圖過程中，就建立新的狀態
        if (!this.isDrawing) {
            // 刪除當前狀態之後的所有狀態（處理復原後又畫新內容的情況）
            if (this.currentStateIndex < this.stateHistory.length - 1) {
                this.stateHistory = this.stateHistory.slice(0, this.currentStateIndex + 1);
            }

            // 添加新狀態
            this.stateHistory.push({
                timestamp: currentTime,
                state: state
            });

            // 保持最大狀態數量
            if (this.stateHistory.length > this.maxStates) {
                this.stateHistory.shift();
            }

            // 更新當前狀態索引
            this.currentStateIndex = this.stateHistory.length - 1;
        }

        this.updateUndoButtonState();
    }

    loadPreviousState() {
        // 確保有前一個狀態可以復原
        if (this.currentStateIndex <= 0) {
            console.log('沒有更多可以復原的狀態');
            return;
        }

        // 移動到前一個狀態
        this.currentStateIndex--;
        const savedState = this.stateHistory[this.currentStateIndex].state;

        // 清除現有圖層
        while (layers.length > 0) {
            const layer = layers.pop();
            layer.canvas.remove();
        }
        layerList.innerHTML = '';
        layerCounter = 0;

        // 恢復基本設定
        backgroundColor = savedState.backgroundColor || 'white';
        brushSizeInput.value = savedState.brushSize || 5;
        brushColorInput.value = savedState.brushColor || '#000000';
        pressureSlider.value = savedState.pressureSliderValue || 0.5;
        canvasWidthInput.value = savedState.canvasWidth || 800;
        canvasHeightInput.value = savedState.canvasHeight || 600;

        // 恢復圖層
        savedState.layers.forEach(layerData => {
            createLayer(layerData.canvasData);
            const layer = layers[layers.length - 1];
            layer.opacity = layerData.opacity;
            layer.visible = layerData.visible;
            layer.canvas.style.opacity = layerData.opacity;
            layer.canvas.style.display = layerData.visible ? 'block' : 'none';
        });

        // 恢復選取狀態
        if (savedState.selection) {
            selectionBox = savedState.selection.box;
            if (savedState.selection.data) {
                selectionData = new ImageData(
                    new Uint8ClampedArray(savedState.selection.data),
                    selectionBox.width,
                    selectionBox.height
                );
            }
            drawSelectionBox();
        } else {
            // 如果沒有選取狀態，清除現有的選取
            selectionBox = null;
            selectionData = null;
            clearSelectionBox();
        }

        this.updateUndoButtonState();
    }

    updateUndoButtonState() {
        const undoButton = document.getElementById('undo-tool');
        if (!undoButton) return;

        // 只有當有前一個狀態時才啟用復原按鈕
        if (this.currentStateIndex > 0) {
            undoButton.classList.remove('disabled');
            undoButton.title = `復原到上一步 (剩餘 ${this.currentStateIndex} 步)`;
        } else {
            undoButton.classList.add('disabled');
            undoButton.title = '沒有可以復原的動作';
        }
    }
}

// 修改旋轉觸發邏輯，明確指定角度，而不是累加
function rotateLayer(layer, angle) {
    // 確保角度始終維持在 0, 45, 90, 135... 等精確整數，避免浮點數誤差
    layer.rotation = (layer.rotation + angle) % 360;
    
    // 將角度強制取整數，這能解決畫布看起來「抖動」或「像素偏移」的問題
    layer.rotation = Math.round(layer.rotation / 45) * 45;

}
/**
 * 徹底優化的圖層變換函數
 */
/**
 * 徹底優化的圖層變換函數
 * 確保每次變換都基於原始影像，解決畫質劣化問題
/**
 * 徹底優化的圖層變換函數
 */
function updateLayerTransform(layer) {
    // 安全檢查：確保 layer 和 canvas 存在
    if (!layer || !layer.canvas) return;

    const ctx = layer.canvas.getContext('2d');
    
    // 確保原始備份存在。如果不存在，嘗試執行一次同步，
    // 如果同步後仍然沒有內容，至少不要讓程式崩潰
    if (!layer.originalCanvas) {
        syncOriginalCanvas(layer);
    }

    // 1. 清空當前畫布
    ctx.clearRect(0, 0, layer.canvas.width, layer.canvas.height);
    
    ctx.save();
    
    // 2. 設置環境
    ctx.imageSmoothingEnabled = false; 
    ctx.globalAlpha = layer.opacity;
    
    const centerX = Math.floor(layer.canvas.width / 2);
    const centerY = Math.floor(layer.canvas.height / 2);
    
    // 3. 執行變換
    ctx.translate(centerX, centerY);
    
    // 計算縮放與鏡射因子
    const scaleX = layer.scale * (layer.mirrored ? -1 : 1);
    const scaleY = layer.scale;
    ctx.scale(scaleX, scaleY);
    
    // 角度轉換 (保持你的整數化邏輯在外部函數處理)
    ctx.rotate((layer.rotation || 0) * Math.PI / 180);
    
    // 4. 【關鍵保護】：確保 originalCanvas 有內容才繪製
    // 這能防止在初始化異常時畫出空白畫面
    if (layer.originalCanvas && layer.originalCanvas.width > 0) {
        ctx.drawImage(layer.originalCanvas, -centerX, -centerY);
    } else {
        // 如果真的沒有內容，嘗試再次同步一次
        syncOriginalCanvas(layer);
        ctx.drawImage(layer.originalCanvas, -centerX, -centerY);
    }
    
    ctx.restore();
}function rotateLayer(layer, angle) {
    // 確保每次旋轉都基於基礎角度進行修正，避免小數點位移
    layer.rotation = Math.round((layer.rotation + angle) / 45) * 45;
    layer.rotation %= 360;
    
    updateLayerTransform(layer);
}

/**
 * 陣列排序邏輯，並同步更新顯示層級 (zIndex)
 */
function reorderLayers(draggedId, targetId) {
    const draggedIdx = layers.findIndex(l => l.id === draggedId);
    const targetIdx = layers.findIndex(l => l.id === targetId);
    
    if (draggedIdx === -1 || targetIdx === -1) return;

    // 從陣列中移除被拖曳的圖層
    const [removed] = layers.splice(draggedIdx, 1);
    
    // 重新插入到目標位置
    // 這裡我們直接插入到 targetIdx，這會使拖曳的圖層位於目標圖層「下方」
    layers.splice(targetIdx, 0, removed);
    
    // 更新所有圖層的 zIndex
    // 陣列 index 越小越底層，index 越大越頂層
    layers.forEach((l, i) => {
        l.canvas.style.zIndex = i + 1;
    });
    
    // 重新繪製列表並儲存狀態
    updateLayerList();
    if (typeof undoManager !== 'undefined') undoManager.saveState();
}

            height: parseInt(canvasHeightInput.value, 10),
            children: []  // 圖層數組
        };

        // 處理每個圖層
        for (const layer of layers.reverse()) {  // 反轉順序以匹配 Photoshop 的圖層順序
            // 獲取圖層的 ImageData
            const canvas = layer.canvas;
            const ctx = canvas.getContext('2d');
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);

            // 創建圖層數據
            const psdLayer = {
                name: layer.name || `圖層 ${layer.id + 1}`,
                opacity: Math.round(layer.opacity * 255),  // PSD 使用 0-255 的透明度範圍
                visible: layer.visible,
                imageData: imageData,
                closed: true  // 表示圖層是否折疊
            };

            psd.children.push(psdLayer);
        }

        // 使用 ag-psd 創建 PSD 文件
        const buffer = await agPsd.writePsd(psd);
        
        // 創建 Blob 並下載
        const blob = new Blob([buffer], { type: 'image/vnd.adobe.photoshop' });
        const filename = document.getElementById('filename').value || 'drawing';
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `${filename}.psd`;
        a.click();
        URL.revokeObjectURL(a.href);

        alert('PSD 文件保存成功！');
    } catch (error) {
        console.error('保存 PSD 失敗:', error);
        alert('保存 PSD 失敗，請查看控制台了解詳細信息。');
    }
}

// 導入 JSON 功能
async function importFromJSON(file) {
    try {
        const reader = new FileReader();
        reader.onload = async function(e) {
            try {
                const drawingData = JSON.parse(e.target.result);
                
                // 驗證 JSON 格式
                if (!drawingData.canvasSize || !drawingData.layers) {
                    throw new Error('無效的 JSON 格式');
                }

                // 更新畫布大小
                canvasWidthInput.value = drawingData.canvasSize.width;
                canvasHeightInput.value = drawingData.canvasSize.height;
                resizeCanvas();

                // 清除現有圖層
                while (layers.length > 0) {
                    const layer = layers.pop();
                    layer.canvas.remove();
                }
                layerList.innerHTML = '';
                layerCounter = 0;

                // 恢復設定
                if (drawingData.settings) {
                    backgroundColor = drawingData.settings.backgroundColor;
                    bgColorSelect.value = drawingData.settings.backgroundType;
                    customBgColorInput.value = drawingData.settings.customBackgroundColor;
                    scale = drawingData.settings.scale;
                    offsetX = drawingData.settings.offsetX;
                    offsetY = drawingData.settings.offsetY;

                    if (drawingData.settings.brush) {
                        brushSizeInput.value = drawingData.settings.brush.size;
                        brushColorInput.value = drawingData.settings.brush.color;
                        pressureSlider.value = drawingData.settings.brush.pressure;
                    }
                }

                // 恢復圖層
                for (const layerData of drawingData.layers) {
                    const img = new Image();
                    img.onload = () => {
                        const layer = createLayer();
                        const ctx = layer.canvas.getContext('2d');
                        
                        // 恢復圖層屬性
                        layer.name = layerData.name;
                        layer.opacity = layerData.opacity;
                        layer.visible = layerData.visible;
                        layer.rotation = layerData.rotation;
                        layer.mirrored = layerData.mirrored;
                        layer.isTransparent = layerData.isTransparent;
                        
                        // 應用變換並繪製
                        ctx.save();
                        ctx.translate(layer.canvas.width / 2, layer.canvas.height / 2);
                        ctx.scale(layer.mirrored ? -1 : 1, 1);
                        ctx.rotate(layer.rotation * Math.PI / 180);
                        ctx.drawImage(img, -layer.canvas.width / 2, -layer.canvas.height / 2);
                        ctx.restore();
                        
                        // 更新顯示
                        layer.canvas.style.opacity = layerData.opacity;
                        layer.canvas.style.display = layerData.visible ? 'block' : 'none';
                        layer.canvas.style.zIndex = layerData.zIndex;

                        if (layerData.isTransparent) {
                            updateLayerDisplay(layer);
                        }
                    };
                    img.src = layerData.canvasData;
                }

                // 更新介面
                updateCanvasTransform();
                updateLayerList();
                
                alert('JSON 文件導入成功！');
            } catch (error) {
                console.error('解析 JSON 失敗:', error);
                alert('解析 JSON 失敗: ' + error.message);
            }
        };
        reader.readAsText(file);
    } catch (error) {
        console.error('導入 JSON 失敗:', error);
        alert('導入 JSON 失敗: ' + error.message);
    }
}

    const pasteY = Math.floor((y - rect.top) / scale);

/**
 * 旋轉選取區的專用函數
 */
function rotateSelectionData() {
    if (!selectionData || !selectionBox) return;

    // 建立一個畫布來旋轉選取區
    const tempCanvas = document.createElement('canvas');
    tempCanvas.width = selectionBox.width;
    tempCanvas.height = selectionBox.height;
    tempCanvas.getContext('2d').putImageData(selectionData, 0, 0);

    // 旋轉後新的選取區大小（如果是非 90 度倍數，選區寬高會變，這裡假設以 90 度為基準）
    // 如果您需要任意角度，寬高需使用三角函數計算矩形邊界
    const rotatedCanvas = document.createElement('canvas');
    rotatedCanvas.width = selectionBox.height; // 互換寬高
    rotatedCanvas.height = selectionBox.width;
    const ctx = rotatedCanvas.getContext('2d');

    ctx.translate(rotatedCanvas.width / 2, rotatedCanvas.height / 2);
    ctx.rotate(90 * Math.PI / 180); // 這裡以 90 度為例
    ctx.drawImage(tempCanvas, -tempCanvas.width / 2, -tempCanvas.height / 2);

    // 更新 selectionData
    selectionData = ctx.getImageData(0, 0, rotatedCanvas.width, rotatedCanvas.height);
    selectionBox.width = rotatedCanvas.width;
    selectionBox.height = rotatedCanvas.height;

    drawSelectionBox(); // 重新繪製虛線框
}

 */
/**
 * 修正後的實質旋轉選取區邏輯
 */
function rotateContent(sourceData, width, height, x, y, isSelection = false) {
    // 1. 建立旋轉用的緩衝畫布

    if (lastDrawRect.w > 0) {

            lastDrawRect.x - padding, 
            lastDrawRect.y - padding, 
            lastDrawRect.w + padding * 2, 
            lastDrawRect.h + padding * 2

    if (!selectionBox) {

    }

    ctx.strokeStyle = '#0095ff';

        w: selectionBox.width, 
        h: selectionBox.height

            <button type="button" data-mobile-action="grid">網格變形</button>
        </div>
        <button type="button" class="close" data-mobile-action="close">關閉</button>
    </div>`;
    document.body.appendChild(sheet);

    let lastPoint = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
    const show = point => {
        if (point) lastPoint = point;
        sheet.querySelectorAll('[data-mobile-action]').forEach(button => {
            const action = button.dataset.mobileAction;
            button.disabled = ['copy', 'cut', 'rotate-left', 'rotate-right', 'mirror-x', 'mirror-y', 'grid'].includes(action) && !api.hasSelection();
            if (action === 'paste') button.disabled = !api.hasClipboard();
        });
        sheet.classList.add('is-open');
    };
    const close = () => sheet.classList.remove('is-open');
    trigger.addEventListener('click', () => show());
    sheet.addEventListener('click', event => { if (event.target === sheet) close(); });
    sheet.querySelector('.sheet-panel').addEventListener('click', event => event.stopPropagation());
    sheet.addEventListener('click', event => {
        const action = event.target.closest('[data-mobile-action]')?.dataset.mobileAction;
        if (!action || event.target.disabled) return;
        if (action === 'close') return close();
        let ok = false;
        if (action === 'copy') ok = api.copy();
        if (action === 'cut') ok = api.cut();
        if (action === 'paste') ok = api.paste(api.pointFromClient(lastPoint));
        if (action === 'rotate-left') ok = api.rotate(-90);
        if (action === 'rotate-right') ok = api.rotate(90);
        if (action === 'mirror-x') ok = api.mirror(true);
        if (action === 'mirror-y') ok = api.mirror(false);
        if (action === 'grid') ok = api.toggleGrid();
        if (ok) close();
    });

    let timer = null, start = null;
    const cancelHold = () => { if (timer) clearTimeout(timer); timer = null; start = null; };
    document.addEventListener('pointerdown', event => {
        if (!container.contains(event.target) || event.pointerType !== 'touch' || event.isPrimary === false) return;
        start = { x: event.clientX, y: event.clientY };
        lastPoint = start;
        timer = setTimeout(() => { timer = null; navigator.vibrate?.(12); show(start); }, 550);
    }, { capture: true, passive: true });
    document.addEventListener('pointermove', event => {
        if (!start) return;
        lastPoint = { x: event.clientX, y: event.clientY };
        if (Math.hypot(event.clientX - start.x, event.clientY - start.y) > 12) cancelHold();
    }, { capture: true, passive: true });
    ['pointerup', 'pointercancel'].forEach(type => document.addEventListener(type, cancelHold, { capture: true, passive: true }));
});
</script>
</body>
</html>
