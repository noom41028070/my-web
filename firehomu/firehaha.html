        el.style.background = note.color || NOTE_COLORS[0];

        const toolbar = document.createElement("div");
        toolbar.className = "note-toolbar";

        const dot = document.createElement("span");
        dot.className = "note-color-dot";
        dot.style.background = note.color || NOTE_COLORS[0];
        dot.title = "點擊切換顏色";
        dot.addEventListener("click", (e)=>{
            e.stopPropagation();
            const idx = NOTE_COLORS.indexOf(note.color);
            note.color = NOTE_COLORS[(idx+1) % NOTE_COLORS.length];
            el.style.background = note.color;
            dot.style.background = note.color;
            markProjectDirty();
        });

        const delBtn = document.createElement("button");
        delBtn.className = "note-delete-btn";
        delBtn.type = "button";
        delBtn.textContent = "✕ 刪除";
        delBtn.addEventListener("click", (e)=>{
            e.stopPropagation();
            if(!confirm("確定要刪除這則便利貼／圖片嗎？")) return;
            window.allNotes = window.allNotes.filter(n => n.id !== note.id);
            el.remove();
            markProjectDirty();
        });

        toolbar.appendChild(dot);
        toolbar.appendChild(delBtn);
        el.appendChild(toolbar);

        if(note.type === "image" && note.image){
            const img = document.createElement("img");
            img.src = note.image;
            el.appendChild(img);
            if(note.name){
                const cap = document.createElement("div");
                cap.style.fontSize = "11px";
                cap.style.opacity = "0.7";
                cap.textContent = note.name;
                el.appendChild(cap);
            }
        } else {
            const ta = document.createElement("textarea");
            ta.value = note.text || "";
            ta.placeholder = "寫點什麼…（劇情靈感、待辦、設定備忘）";
            ta.addEventListener("pointerdown", e => e.stopPropagation());
            ta.addEventListener("input", ()=>{
                note.text = ta.value;
                markProjectDirty();
            });
            el.appendChild(ta);
        }

        // 拖曳移動（與節點拖曳邏輯一致：用 clientX/Y 位移量累加，不受捲動影響；
        // 同時支援滑鼠與觸控，因為 Pointer Events 本來就統一了兩者）
        // move/up 監聽掛在 document 上，不只掛在便利貼本身：
        // 這樣手指滑得比較快、暫時滑出便利貼範圍時，也不會漏接後續移動事件，
        // 拖曳體感才會跟拉節點一樣穩、一樣跟得上手指。
        el.addEventListener("pointerdown", (e)=>{
            if(e.target.tagName === "TEXTAREA") return;
            if(e.target.closest(".note-toolbar")) return; // 點色點／刪除鈕不要誤觸拖曳
            e.preventDefault();
            try { el.setPointerCapture(e.pointerId); } catch(err) {}
            el.classList.add("dragging");
            const offsetX = e.clientX - note.x;
            const offsetY = e.clientY - note.y;
            function move(ev){
                note.x = Math.max(0, ev.clientX - offsetX);
                note.y = Math.max(0, ev.clientY - offsetY);
                el.style.left = note.x + "px";
                el.style.top = note.y + "px";
                markProjectDirty();
            }
            function up(){
                el.classList.remove("dragging");
                document.removeEventListener("pointermove", move);
                document.removeEventListener("pointerup", up);
                document.removeEventListener("pointercancel", up);
            }
            document.addEventListener("pointermove", move);
            document.addEventListener("pointerup", up);
            document.addEventListener("pointercancel", up);
        });

        return el;
    }

    window.renderNotes = function(){
        flowCanvasEl.querySelectorAll(".corkboard-note").forEach(n => n.remove());
        (window.allNotes || []).forEach(note => {
            flowCanvasEl.appendChild(createNoteElement(note));
        });
    };

    window.addStickyNote = function(opts){
        opts = opts || {};
        const pos = (opts.x !== undefined && opts.y !== undefined)
            ? { x: opts.x, y: opts.y }
            : { x: flowPanelEl.scrollLeft + 60, y: flowPanelEl.scrollTop + 60 };
        const note = {
            id: (crypto.randomUUID ? crypto.randomUUID() : "note-" + Date.now() + Math.random()),
            type: opts.type || "text",
            text: opts.text || "",
            image: opts.image || null,
            name: opts.name || "",
            color: opts.color || NOTE_COLORS[Math.floor(Math.random()*NOTE_COLORS.length)],
            x: pos.x,
            y: pos.y
        };
        window.allNotes.push(note);
        flowCanvasEl.appendChild(createNoteElement(note));
        markProjectDirty();
        return note;
    };

    const stickyBtn = document.getElementById("sticky-note-add-btn");
    if (stickyBtn) stickyBtn.addEventListener("click", ()=> window.addStickyNote({}));

    // 頁面剛載入時先渲染一次（理論上此時 allNotes 應為空，等專案載入後 importProjectData 會再呼叫一次）
    window.renderNotes();

    // =====================================================
    // 模組二：素材庫（資料夾）－ 像虛擬桌布一樣可以放檔案，再拖到畫布上釘選
    // =====================================================
    const MATERIAL_KEY = "PixivNovelMaterialLibrary_V1";

    function loadMaterials(){
        try { return JSON.parse(safeStorage.getItem(MATERIAL_KEY) || "[]"); }
        catch(e){ return []; }
    }
    function saveMaterials(list){
        safeStorage.setItem(MATERIAL_KEY, JSON.stringify(list));
    }

    const libPanel = document.createElement("div");
    libPanel.id = "material-library-panel";
    libPanel.innerHTML =
        '<header>' +
            '<span>📁 素材庫</span>' +
            '<button type="button" id="material-close-btn">✕</button>' +
        '</header>' +
        '<div id="material-drop-zone">' +
            '拖曳圖片／文字檔到這裡<br>或點擊選擇檔案<br>' +
            '<small>（可再拖到畫布上釘選，就像貼在虛擬桌布上）</small>' +
            '<input type="file" id="material-file-input" accept="image/*,.txt" multiple style="display:none;">' +
        '</div>' +
        '<div id="material-library-list"></div>';
    document.body.appendChild(libPanel);

    const dropZone = document.getElementById("material-drop-zone");
    const materialFileInput = document.getElementById("material-file-input");
    const materialListEl = document.getElementById("material-library-list");

    function renderMaterialList(){
        const items = loadMaterials();
        materialListEl.innerHTML = "";
        items.forEach((item, idx) => {
            const card = document.createElement("div");
            card.className = "material-item";
            card.dataset.idx = idx;

            if(item.type === "image"){
                const img = document.createElement("img");
                img.src = item.data;
                card.appendChild(img);
            } else {
                const box = document.createElement("div");
                box.style.cssText = "height:70px;display:flex;align-items:center;justify-content:center;background:#f0f0f0;border-radius:4px;font-size:22px;";
                box.textContent = "📄";
                card.appendChild(box);
            }
            const name = document.createElement("div");
            name.className = "material-name";
            name.textContent = item.name;
            card.appendChild(name);

            const removeBtn = document.createElement("button");
            removeBtn.className = "material-remove";
            removeBtn.type = "button";
            removeBtn.textContent = "✕";
            removeBtn.addEventListener("click", (e)=>{
                e.stopPropagation();
                const cur = loadMaterials();
                cur.splice(idx, 1);
                saveMaterials(cur);
                renderMaterialList();
            });
            card.appendChild(removeBtn);

            // 用 Pointer Events 自己做拖曳，滑鼠／觸控／手寫筆統一支援，
            // 跟拉節點（dragNode）同一套手感：按下就立刻跟著手指/游標走。
            card.addEventListener("pointerdown", (e)=>{
                if(e.target.closest(".material-remove")) return;
                startMaterialDrag(e, item, card);
            });

            materialListEl.appendChild(card);
        });
    }

    function startMaterialDrag(startEvent, item, card){
        startEvent.preventDefault();
        try { card.setPointerCapture(startEvent.pointerId); } catch(err) {}
        card.classList.add("dragging-source");

        const ghost = document.createElement("div");
        ghost.className = "material-drag-ghost";
        if(item.type === "image"){
            ghost.innerHTML = '<img src="' + item.data + '" alt="">';
        } else {
            ghost.innerHTML =
                '<div class="ghost-doc-icon">📄</div>' +
                '<div class="ghost-name">' + escapeHtml(item.name) + '</div>';
        }
        document.body.appendChild(ghost);
        positionGhost(startEvent.clientX, startEvent.clientY);

        function positionGhost(x, y){
            ghost.style.left = x + "px";
            ghost.style.top = y + "px";
        }

        function isOverCanvas(x, y){
            const rect = flowPanelEl.getBoundingClientRect();
            return x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom;
        }

        function move(ev){
            positionGhost(ev.clientX, ev.clientY);
            const over = isOverCanvas(ev.clientX, ev.clientY);
            flowPanelEl.classList.toggle("material-drop-hover", over);
            ghost.classList.toggle("drop-ready", over);
        }

        function finish(ev){
            document.removeEventListener("pointermove", move);
            document.removeEventListener("pointerup", finish);
            document.removeEventListener("pointercancel", cancel);
            card.classList.remove("dragging-source");
            flowPanelEl.classList.remove("material-drop-hover");
            ghost.remove();

            if(isOverCanvas(ev.clientX, ev.clientY)){
                const pos = toLocalXY(ev.clientX, ev.clientY);
                if(item.type === "image"){
                    window.addStickyNote({ type:"image", image:item.data, name:item.name, x:pos.x - 60, y:pos.y - 40, color:"#ffffff" });
                } else {
                    window.addStickyNote({ type:"text", text:item.data, name:item.name, x:pos.x - 60, y:pos.y - 40 });
                }
                // 拖成功後自動收合面板，手機上能立刻看到剛剛放上畫布的結果
                libPanel.classList.remove("open");
            }
        }

        function cancel(){
            document.removeEventListener("pointermove", move);
            document.removeEventListener("pointerup", finish);
            document.removeEventListener("pointercancel", cancel);
            card.classList.remove("dragging-source");
            flowPanelEl.classList.remove("material-drop-hover");
            ghost.remove();
        }

        document.addEventListener("pointermove", move);
        document.addEventListener("pointerup", finish);
        document.addEventListener("pointercancel", cancel);
    }

    function escapeHtml(str){
        return String(str).replace(/[&<>"']/g, c => ({
            "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;"
        }[c]));
    }

    function handleMaterialFiles(files){
        if(!files || !files.length) return;
        const items = loadMaterials();
        let remaining = files.length;
        Array.from(files).forEach(file => {
            const reader = new FileReader();
            reader.onload = () => {
                if(file.type.startsWith("image/")){
                    items.push({ type:"image", name:file.name, data: reader.result });
                } else {
                    items.push({ type:"text", name:file.name, data: reader.result });
                }
                remaining--;
                if(remaining === 0){
                    saveMaterials(items);
                    renderMaterialList();
                }
            };
            if(file.type.startsWith("image/")) reader.readAsDataURL(file);
            else reader.readAsText(file, "UTF-8");
        });
    }

    dropZone.addEventListener("click", ()=> materialFileInput.click());
    materialFileInput.addEventListener("change", (e)=>{
        handleMaterialFiles(e.target.files);
        materialFileInput.value = "";
    });
    ["dragover","dragenter"].forEach(evt => {
        dropZone.addEventListener(evt, (e)=>{
            e.preventDefault();
            dropZone.classList.add("dragover");
        });
    });
    ["dragleave","drop"].forEach(evt => {
        dropZone.addEventListener(evt, ()=> dropZone.classList.remove("dragover"));
    });
    dropZone.addEventListener("drop", (e)=>{
        e.preventDefault();
        if(e.dataTransfer.files && e.dataTransfer.files.length){
            handleMaterialFiles(e.dataTransfer.files);
        }
    });

    const folderBtn = document.getElementById("folder-toggle-btn");
    if (folderBtn) folderBtn.addEventListener("click", ()=>{
        libPanel.classList.toggle("open");
        if(libPanel.classList.contains("open")) renderMaterialList();
    });
    const materialCloseBtn = document.getElementById("material-close-btn");
    if (materialCloseBtn) materialCloseBtn.addEventListener("click", ()=> libPanel.classList.remove("open"));

    renderMaterialList();

    // =====================================================
    // 模組三：自由畫筆
    // =====================================================
    window.allDrawings = window.allDrawings || [];
    window.__drawModeActive = false;

    const svgNS = "http://www.w3.org/2000/svg";
    const drawLayer = document.createElementNS(svgNS, "svg");
    drawLayer.id = "drawLayer";
    drawLayer.style.position = "absolute";
    drawLayer.style.left = "0";
    drawLayer.style.top = "0";
    drawLayer.style.zIndex = "50";
    drawLayer.style.pointerEvents = "none";
    // 手機關鍵：不設 touch-action:none 的話，瀏覽器會把手指移動誤判成「想滾動畫面」，
    // 導致畫筆在手機上完全畫不出線、或者線斷斷續續、延遲很重。
    drawLayer.style.touchAction = "none";
    drawLayer.style.webkitUserSelect = "none";
    drawLayer.style.userSelect = "none";
    flowCanvasEl.appendChild(drawLayer);

    function resizeDrawLayer(){
        const w = Math.max(flowPanelEl.scrollWidth, flowCanvasEl.offsetWidth, 1200);
        const h = Math.max(flowPanelEl.scrollHeight, flowCanvasEl.offsetHeight, 1000);
        drawLayer.setAttribute("width", w);
        drawLayer.setAttribute("height", h);
        drawLayer.style.width = w + "px";
        drawLayer.style.height = h + "px";
    }

    // 筆劃資料統一用座標點陣列（points）記錄，橡皮擦才有辦法「只擦局部」；
    // d 字串用 pointsToD 隨時從 points 重新算出即可，不需要另外維護兩份。
    function pointsToD(points){
        if(!points || !points.length) return "";
        return points.map((p, i) => (i === 0 ? "M " : "L ") + p[0] + " " + p[1]).join(" ");
    }
    // 讀舊專案時，可能還是舊格式（只有 d 字串、沒有 points），
    // 這裡負責把 d 字串還原成座標點陣列，讓舊存檔一樣能被橡皮擦局部擦除。
    function parseDToPoints(d){
        const points = [];
        if(!d) return points;
        const re = /[ML]\s*(-?[0-9.]+)\s+(-?[0-9.]+)/g;
        let m;
        while((m = re.exec(d))){
            points.push([parseFloat(m[1]), parseFloat(m[2])]);
        }
        return points;
    }

    window.renderDrawings = function(){
        // 專案切換/匯入時 flowCanvas.innerHTML 會被整個清空，
        // drawLayer 這個 SVG 節點也會跟著被移除，所以每次渲染都要重新插回去，
        // 不然畫筆圖層就會憑空消失，畫了也看不到、點了也沒反應。
        flowCanvasEl.appendChild(drawLayer);
        drawLayer.innerHTML = "";
        resizeDrawLayer();
        (window.allDrawings || []).forEach(stroke => {
            if(!stroke.points || !stroke.points.length){
                stroke.points = parseDToPoints(stroke.d || "");
            }
            const path = document.createElementNS(svgNS, "path");
            path.setAttribute("d", pointsToD(stroke.points));
            path.setAttribute("fill", "none");
            path.setAttribute("stroke", stroke.color || "#e53935");
            path.setAttribute("stroke-width", stroke.width || 3);
            path.setAttribute("stroke-linecap", "round");
            path.setAttribute("stroke-linejoin", "round");
            drawLayer.appendChild(path);
        });
    };
    window.renderDrawings();

    let drawColor = "#e53935";
    let drawWidth = 3;
    let eraserMode = false;
    let currentPath = null;
    let currentPoints = null;
    let isErasing = false;

    const drawToolbar = document.createElement("div");
    drawToolbar.id = "draw-toolbar";
    const DRAW_COLORS = ["#e53935","#1976d2","#43a047","#fbc02d","#212121","#ffffff"];
    drawToolbar.innerHTML =
        DRAW_COLORS.map(c => '<span class="draw-color" data-color="'+c+'" style="background:'+c+';"></span>').join("") +
        '<button type="button" data-w="2">細</button>' +
        '<button type="button" data-w="4">中</button>' +
        '<button type="button" data-w="9">粗</button>' +
        '<button type="button" id="draw-eraser-btn">🧹 橡皮擦</button>' +
        '<button type="button" id="draw-undo-btn">↩ 復原</button>' +
        '<button type="button" id="draw-clear-btn">🗑 清空</button>' +
        '<button type="button" id="draw-done-btn">✅ 完成</button>';
    document.body.appendChild(drawToolbar);

    // 橡皮擦的圓形預覽游標：跟著手指／滑鼠走，讓使用者知道目前會擦掉多大範圍
    const eraserCursor = document.createElement("div");
    eraserCursor.id = "eraser-cursor";
    eraserCursor.style.display = "none";
    document.body.appendChild(eraserCursor);

    function currentEraserRadius(){
        // 橡皮擦大小跟著目前選的筆刷粗細走（粗筆刷 → 橡皮擦也比較大），
        // 不用另外多做一組「橡皮擦大小」的按鈕，操作起來比較直覺。
        return Math.max(14, drawWidth * 5);
    }

    function updateEraserCursor(clientX, clientY){
        const r = currentEraserRadius();
        eraserCursor.style.width = (r * 2) + "px";
        eraserCursor.style.height = (r * 2) + "px";
        eraserCursor.style.left = (clientX - r) + "px";
        eraserCursor.style.top = (clientY - r) + "px";
    }

    drawToolbar.querySelectorAll(".draw-color").forEach(dot => {
        dot.addEventListener("click", ()=>{
            drawColor = dot.dataset.color;
            drawToolbar.querySelectorAll(".draw-color").forEach(d=>d.classList.remove("active"));
            dot.classList.add("active");
            eraserMode = false;
            eraserCursor.style.display = "none";
            const eraserBtn = document.getElementById("draw-eraser-btn");
            if (eraserBtn) eraserBtn.classList.remove("active-tool");
        });
    });
    drawToolbar.querySelectorAll("button[data-w]").forEach(btn => {
        btn.addEventListener("click", ()=>{ drawWidth = Number(btn.dataset.w); });
    });
    document.getElementById("draw-eraser-btn").addEventListener("click", (e)=>{
        eraserMode = !eraserMode;
        e.target.classList.toggle("active-tool", eraserMode);
        if(!eraserMode) eraserCursor.style.display = "none";
    });
    document.getElementById("draw-undo-btn").addEventListener("click", ()=>{
        window.allDrawings.pop();
        window.renderDrawings();
        markProjectDirty();
    });
    document.getElementById("draw-clear-btn").addEventListener("click", ()=>{
        if(!window.allDrawings.length) return;
        if(!confirm("確定要清空所有畫筆標記嗎？此動作無法復原。")) return;
        window.allDrawings = [];
        window.renderDrawings();
        markProjectDirty();
    });
    document.getElementById("draw-done-btn").addEventListener("click", ()=> setDrawMode(false));

    function setDrawMode(active){
        window.__drawModeActive = active;
        flowPanelEl.classList.toggle("drawing-active", active);
        drawLayer.style.pointerEvents = active ? "auto" : "none";
        drawToolbar.classList.toggle("open", active);
        const toggleBtn = document.getElementById("draw-mode-toggle-btn");
        if (toggleBtn) toggleBtn.classList.toggle("active-tool", active);
        if(active) resizeDrawLayer();
        else eraserCursor.style.display = "none";
    }

    const drawModeBtn = document.getElementById("draw-mode-toggle-btn");
    if (drawModeBtn) drawModeBtn.addEventListener("click", ()=> setDrawMode(!window.__drawModeActive));

    // 局部橡皮擦：只挖掉游標半徑內的那幾個點，同一條線被挖斷的話就自動拆成
    // 兩段（或多段）獨立的線，不會像以前那樣一碰到線就整條消失。
    function eraseNear(pos){
        const r2 = currentEraserRadius() * currentEraserRadius();
        let changed = false;
        const rebuilt = [];

        (window.allDrawings || []).forEach(stroke => {
            const pts = stroke.points && stroke.points.length ? stroke.points : parseDToPoints(stroke.d || "");
            let run = [];

            function flushRun(){
                if(run.length >= 2){
                    rebuilt.push({ points: run, color: stroke.color, width: stroke.width });
                } else if(run.length === 1){
                    // 只剩單獨一個點連不成線，直接捨棄，不留下無意義的殘段
                }
                run = [];
            }

            pts.forEach(p => {
                const dx = p[0] - pos.x, dy = p[1] - pos.y;
                if(dx*dx + dy*dy <= r2){
                    changed = true;
                    flushRun();
                } else {
                    run.push(p);
                }
            });
            flushRun();
        });

        if(changed){
            window.allDrawings = rebuilt;
            window.renderDrawings();
            markProjectDirty();
        }
    }

    drawLayer.addEventListener("pointerdown", (e)=>{
        if(!window.__drawModeActive) return;
        e.preventDefault();
        e.stopPropagation();
        try { drawLayer.setPointerCapture(e.pointerId); } catch(err) {}

        if(eraserMode){
            isErasing = true;
            updateEraserCursor(e.clientX, e.clientY);
            eraserCursor.style.display = "block";
            eraseNear(toLocalXY(e.clientX, e.clientY));
            return;
        }
        const pos = toLocalXY(e.clientX, e.clientY);
        currentPoints = [[pos.x, pos.y]];
        currentPath = document.createElementNS(svgNS, "path");
        currentPath.setAttribute("d", pointsToD(currentPoints));
        currentPath.setAttribute("fill", "none");
        currentPath.setAttribute("stroke", drawColor);
        currentPath.setAttribute("stroke-width", drawWidth);
        currentPath.setAttribute("stroke-linecap", "round");
        currentPath.setAttribute("stroke-linejoin", "round");
        drawLayer.appendChild(currentPath);
    });

    drawLayer.addEventListener("pointermove", (e)=>{
        if(!window.__drawModeActive) return;
        if(eraserMode){
            updateEraserCursor(e.clientX, e.clientY);
            eraserCursor.style.display = "block";
            if(isErasing) eraseNear(toLocalXY(e.clientX, e.clientY));
            return;
        }
        if(!currentPath) return;
        const pos = toLocalXY(e.clientX, e.clientY);
        currentPoints.push([pos.x, pos.y]);
        currentPath.setAttribute("d", pointsToD(currentPoints));
    });

    function endStroke(){
        if(currentPath && currentPoints && currentPoints.length >= 2){
            window.allDrawings.push({
                points: currentPoints,
                color: drawColor,
                width: drawWidth
            });
            markProjectDirty();
        }
        currentPath = null;
        currentPoints = null;
        isErasing = false;
    }
    drawLayer.addEventListener("pointerup", endStroke);
    drawLayer.addEventListener("pointercancel", endStroke);
    drawLayer.addEventListener("pointerleave", (e)=>{
        if(eraserMode && !isErasing) eraserCursor.style.display = "none";
    });

    window.addEventListener("resize", ()=>{
        if(window.__drawModeActive) resizeDrawLayer();
    });

    // =====================================================
    // 模組四：擲骰工具（給 Gamebook／互動小說作者測試隨機分歧、事件表用）
    // =====================================================
    const dicePanel = document.createElement("div");
    dicePanel.id = "dice-roller-panel";
    dicePanel.innerHTML =
        '<div style="font-weight:bold;margin-bottom:8px;">🎲 擲骰工具</div>' +
        '<div class="dice-grid">' +
            '<button type="button" data-d="4">d4</button>' +
            '<button type="button" data-d="6">d6</button>' +
            '<button type="button" data-d="8">d8</button>' +
            '<button type="button" data-d="10">d10</button>' +
            '<button type="button" data-d="12">d12</button>' +
            '<button type="button" data-d="20">d20</button>' +
            '<button type="button" data-d="100">d100</button>' +
            '<button type="button" id="dice-custom-btn">自訂</button>' +
        '</div>' +
        '<div id="dice-roller-result">—</div>' +
        '<div id="dice-roller-history"></div>';
    document.body.appendChild(dicePanel);

    const diceHistory = [];
    function rollDice(sides){
        const result = 1 + Math.floor(Math.random() * sides);
        document.getElementById("dice-roller-result").textContent = "d" + sides + " → " + result;
        diceHistory.unshift("d" + sides + ": " + result);
        diceHistory.length = Math.min(diceHistory.length, 8);
        document.getElementById("dice-roller-history").innerHTML = diceHistory.join("<br>");
    }
    dicePanel.querySelectorAll("button[data-d]").forEach(btn => {
        btn.addEventListener("click", ()=> rollDice(Number(btn.dataset.d)));
    });
    document.getElementById("dice-custom-btn").addEventListener("click", ()=>{
        const val = prompt("輸入骰子面數（例如 3 代表 1~3）：", "6");
        const n = parseInt(val, 10);
        if(n && n > 1) rollDice(n);
    });
    const diceBtn = document.getElementById("dice-roller-btn");
    if (diceBtn) diceBtn.addEventListener("click", ()=> dicePanel.classList.toggle("open"));

})();






</script>
</body>
</html>
